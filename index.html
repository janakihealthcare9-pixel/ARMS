<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Roster Management | RMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; }
        [x-cloak] { display: none !important; }
        .roster-grid { display: grid; grid-template-columns: 180px repeat(7, 1fr); }
        .shift-cell { min-height: 100px; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; }
    </style>
</head>
<body x-data="rosterApp()" x-init="init()" class="h-screen flex overflow-hidden">

    <!-- Simple Login -->
    <div x-show="!isLoggedIn && !isGuest" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-6">Hospital Roster Login</h2>
            <div class="space-y-4">
                <input type="text" x-model="loginForm.username" placeholder="Username" class="w-full border p-2 rounded">
                <input type="password" x-model="loginForm.password" placeholder="Password" class="w-full border p-2 rounded">
                <button @click="login" class="w-full bg-blue-600 text-white py-2 rounded font-bold">Sign In</button>
                <button @click="isGuest = true" class="w-full border py-2 rounded text-slate-600">View as Guest</button>
            </div>
            <p class="text-xs text-slate-400 mt-4">Demo: admin / password123</p>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r flex-shrink-0 flex flex-col" x-show="isLoggedIn || isGuest">
        <div class="p-6 border-b font-bold text-xl text-blue-600 italic">RMS Pro</div>
        <nav class="flex-1 p-4 space-y-2">
            <button @click="activeTab = 'roster'" :class="activeTab === 'roster' ? 'bg-blue-50 text-blue-600' : ''" class="w-full text-left p-2 rounded">Roster</button>
            <template x-if="role === 'admin'">
                <div class="space-y-2">
                    <button @click="activeTab = 'depts'" :class="activeTab === 'depts' ? 'bg-blue-50 text-blue-600' : ''" class="w-full text-left p-2 rounded">Departments</button>
                    <button @click="activeTab = 'emps'" :class="activeTab === 'emps' ? 'bg-blue-50 text-blue-600' : ''" class="w-full text-left p-2 rounded">Employees</button>
                </div>
            </template>
        </nav>
        <div class="p-4 border-t text-sm text-slate-500">
            <span x-text="role === 'admin' ? 'Admin Mode' : 'Guest Mode'"></span>
            <button @click="location.reload()" class="ml-2 underline">Logout</button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-auto bg-slate-50" x-show="isLoggedIn || isGuest">
        <header class="h-16 bg-white border-b px-8 flex items-center justify-between sticky top-0 z-10">
            <h1 class="font-bold text-lg" x-text="activeTab.toUpperCase()"></h1>
            <div x-show="activeTab === 'roster'" class="flex items-center gap-4">
                <button @click="prevWeek()"><i class="fas fa-chevron-left"></i></button>
                <span x-text="getWeekLabel()" class="font-medium"></span>
                <button @click="nextWeek()"><i class="fas fa-chevron-right"></i></button>
                <button x-show="role === 'admin'" @click="generateRoster()" class="bg-emerald-500 text-white px-3 py-1 rounded text-sm">Auto-Fill</button>
            </div>
        </header>

        <div class="p-8">
            <!-- Roster Grid -->
            <div x-show="activeTab === 'roster'" class="bg-white rounded-lg shadow overflow-hidden border">
                <div class="roster-grid bg-slate-100 font-bold text-xs uppercase text-slate-500">
                    <div class="p-4 border-r">Shift</div>
                    <template x-for="day in weekDays">
                        <div class="p-4 text-center border-r" x-text="day.name + ' ' + day.dayNum"></div>
                    </template>
                </div>
                <template x-for="shift in shifts">
                    <div class="roster-grid border-t">
                        <div class="p-4 border-r bg-slate-50">
                            <div class="font-bold text-sm" x-text="shift.name"></div>
                            <div class="text-[10px] text-slate-400" x-text="shift.time"></div>
                        </div>
                        <template x-for="day in weekDays">
                            <div class="shift-cell p-2">
                                <template x-for="a in getAssignments(day.date, shift.id)">
                                    <div class="bg-blue-100 text-blue-800 text-[10px] p-1 rounded mb-1 flex justify-between">
                                        <span x-text="getEmpName(a.employeeId)"></span>
                                        <button x-show="role === 'admin'" @click="removeAssignment(a.id)" class="text-red-400 px-1">×</button>
                                    </div>
                                </template>
                                <button x-show="role === 'admin'" @click="openAssign(day.date, shift.id)" class="w-full border-dashed border text-slate-300 hover:text-blue-400 text-xs py-1 mt-1">+</button>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Depts -->
            <div x-show="activeTab === 'depts'" class="grid grid-cols-3 gap-4">
                <template x-for="d in departments">
                    <div class="bg-white p-4 rounded shadow flex justify-between items-center">
                        <span x-text="d.name" class="font-bold"></span>
                        <button @click="deleteDept(d.id)" class="text-red-400 text-sm">Delete</button>
                    </div>
                </template>
                <button @click="addDept()" class="border-2 border-dashed p-4 rounded text-slate-400">+ Add Dept</button>
            </div>

            <!-- Emps -->
            <div x-show="activeTab === 'emps'" class="bg-white rounded shadow">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-4">Name</th><th class="p-4">Dept</th><th class="p-4 text-right">Action</th></tr>
                    </thead>
                    <tbody>
                        <template x-for="e in employees">
                            <tr class="border-b">
                                <td class="p-4 font-medium" x-text="e.name"></td>
                                <td class="p-4 text-sm text-slate-500" x-text="getDeptName(e.deptId)"></td>
                                <td class="p-4 text-right"><button @click="deleteEmp(e.id)" class="text-red-400">Delete</button></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
                <button @click="addEmp()" class="w-full p-4 text-blue-600 font-bold">+ Add New Employee</button>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        function rosterApp() {
            return {
                isLoggedIn: false, isGuest: false, role: 'guest', activeTab: 'roster',
                loginForm: { username: '', password: '' },
                departments: [{id:'1', name:'General'}, {id:'2', name:'ICU'}],
                employees: [{id:'1', name:'Dr. Smith', deptId:'1'}],
                assignments: [],
                currentWeekStart: new Date(),
                weekDays: [],
                shifts: [
                    { id: 'm', name: 'Morning', time: '06-14' },
                    { id: 'e', name: 'Evening', time: '14-22' },
                    { id: 'n', name: 'Night', time: '22-06' }
                ],
                db: null,

                init() {
                    this.updateWeek();
                    try {
                        const config = {
                            apiKey: "AIzaSyArXNTEiGUXoN1LxQy2BXKymqt0cJkpK9U",
                            authDomain: "com-example-rms-4ea61.firebaseapp.com",
                            projectId: "com-example-rms-4ea61",
                            storageBucket: "com-example-rms-4ea61.appspot.com",
                            appId: "1:326725152339:web:e46fc4ab6f4397abc660a6"
                        };
                        firebase.initializeApp(config);
                        this.db = firebase.firestore();
                        this.syncCloud();
                    } catch (e) { console.log("Cloud offline"); }
                },

                syncCloud() {
                    this.db.collection('depts').onSnapshot(s => { if(s.docs.length) this.departments = s.docs.map(d => ({id:d.id, ...d.data()})) });
                    this.db.collection('emps').onSnapshot(s => { if(s.docs.length) this.employees = s.docs.map(d => ({id:d.id, ...d.data()})) });
                    this.db.collection('assignments').onSnapshot(s => this.assignments = s.docs.map(d => ({id:d.id, ...d.data()})) );
                },

                login() {
                    if(this.loginForm.username === 'admin' && this.loginForm.password === 'password123') {
                        this.isLoggedIn = true; this.role = 'admin';
                    } else alert('Wrong! Use admin / password123');
                },

                updateWeek() {
                    const start = new Date(this.currentWeekStart);
                    start.setDate(start.getDate() - start.getDay() + 1);
                    this.weekDays = [];
                    const names = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                    for(let i=0; i<7; i++) {
                        const d = new Date(start); d.setDate(start.getDate() + i);
                        this.weekDays.push({ name: names[i], dayNum: d.getDate(), date: d.toISOString().split('T')[0] });
                    }
                },
                getWeekLabel() { return this.weekDays[0]?.date + ' to ' + this.weekDays[6]?.date; },
                prevWeek() { this.currentWeekStart.setDate(this.currentWeekStart.getDate() - 7); this.updateWeek(); },
                nextWeek() { this.currentWeekStart.setDate(this.currentWeekStart.getDate() + 7); this.updateWeek(); },

                getAssignments(date, sid) { return this.assignments.filter(a => a.date === date && a.shiftId === sid); },
                getEmpName(id) { return this.employees.find(e => e.id == id)?.name || 'Unknown'; },
                getDeptName(id) { return this.departments.find(d => d.id == id)?.name || 'General'; },

                async addDept() {
                    const n = prompt("Dept Name:");
                    if(n) this.db ? await this.db.collection('depts').add({name: n}) : this.departments.push({id: Date.now(), name: n});
                },
                async deleteDept(id) { if(confirm('Delete?')) this.db ? await this.db.collection('depts').doc(id).delete() : this.departments = this.departments.filter(d => d.id != id); },

                async addEmp() {
                    const n = prompt("Name:");
                    if(n) this.db ? await this.db.collection('emps').add({name: n, deptId: this.departments[0].id}) : this.employees.push({id: Date.now(), name: n, deptId: '1'});
                },
                async deleteEmp(id) { if(confirm('Delete?')) this.db ? await this.db.collection('emps').doc(id).delete() : this.employees = this.employees.filter(e => e.id != id); },

                async openAssign(date, sid) {
                    const eid = prompt("Enter Employee ID (1, 2, etc):");
                    if(eid) this.db ? await this.db.collection('assignments').add({date, shiftId: sid, employeeId: eid}) : this.assignments.push({id: Date.now(), date, shiftId: sid, employeeId: eid});
                },
                async removeAssignment(id) { this.db ? await this.db.collection('assignments').doc(id).delete() : this.assignments = this.assignments.filter(a => a.id != id); },

                async generateRoster() {
                    for(let d of this.weekDays) {
                        for(let s of this.shifts) {
                            if(this.getAssignments(d.date, s.id).length === 0) {
                                const e = this.employees[Math.floor(Math.random() * this.employees.length)];
                                if(this.db) await this.db.collection('assignments').add({date: d.date, shiftId: s.id, employeeId: e.id});
                            }
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
