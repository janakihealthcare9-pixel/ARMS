<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" class="bg-gray-100 font-sans">
    <!-- Login Screen -->
    <div x-show="!isLoggedIn" class="fixed inset-0 bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-900">Hospital Login</h1>
            <input type="text" x-model="user" placeholder="Username" class="w-full border p-3 rounded mb-4">
            <input type="password" x-model="pass" placeholder="Password" class="w-full border p-3 rounded mb-6">
            <button @click="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">LOGIN</button>
            <p class="text-center text-xs mt-4 text-gray-400">admin / password123</p>
        </div>
    </div>

    <!-- Main App -->
    <div x-show="isLoggedIn" class="min-h-screen flex flex-col">
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-lg">
            <span class="font-bold text-xl">JANAKI ROSTER</span>
            <button @click="isLoggedIn = false" class="text-sm bg-blue-700 px-3 py-1 rounded">Logout</button>
        </nav>

        <div class="p-4 flex-1">
            <!-- Tabs -->
            <div class="flex border-b mb-4">
                <button @click="tab='roster'" :class="tab=='roster'?'border-blue-600 text-blue-600':'text-gray-500'" class="p-4 font-bold border-b-2">ROSTER</button>
                <button @click="tab='staff'" :class="tab=='staff'?'border-blue-600 text-blue-600':'text-gray-500'" class="p-4 font-bold border-b-2">STAFF</button>
            </div>

            <!-- Roster Grid -->
            <div x-show="tab=='roster'" class="bg-white rounded shadow overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="border p-3 text-left w-32">SHIFT</th>
                            <template x-for="day in days">
                                <th class="border p-3 text-center" x-text="day"></th>
                            </template>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="shift in shifts">
                            <tr>
                                <td class="border p-3 font-bold bg-gray-50">
                                    <div x-text="shift.name"></div>
                                    <div class="text-[10px] text-gray-400" x-text="shift.time"></div>
                                </td>
                                <template x-for="day in days">
                                    <td class="border p-2 min-h-[80px] vertical-top">
                                        <template x-for="(entry, index) in getEntries(day, shift.id)">
                                            <div class="bg-blue-100 text-blue-800 p-1 text-xs rounded mb-1 flex justify-between">
                                                <span x-text="entry.name"></span>
                                                <button @click="remove(day, shift.id, index)" class="text-red-500 font-bold ml-2">×</button>
                                            </div>
                                        </template>
                                        <button @click="assign(day, shift.id)" class="w-full border-dashed border border-gray-200 text-gray-300 py-1 rounded hover:border-blue-300 hover:text-blue-500 text-xs">+</button>
                                    </td>
                                </template>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Staff List -->
            <div x-show="tab=='staff'" class="bg-white rounded shadow p-6">
                <h2 class="font-bold text-xl mb-4">Employee Directory</h2>
                <template x-for="s in staff">
                    <div class="flex justify-between items-center p-3 border-b">
                        <span x-text="s" class="font-medium text-gray-700"></span>
                        <button @click="deleteStaff(s)" class="text-red-500 text-sm">Remove</button>
                    </div>
                </template>
                <button @click="addStaff()" class="mt-4 bg-emerald-500 text-white px-4 py-2 rounded font-bold">+ Add Employee</button>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                isLoggedIn: false, user: '', pass: '', tab: 'roster',
                days: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                shifts: [
                    {id:'m', name:'Morning', time:'06:00-14:00'},
                    {id:'e', name:'Evening', time:'14:00-22:00'},
                    {id:'n', name:'Night', time:'22:00-06:00'}
                ],
                staff: ['Dr. Alice', 'Dr. Bob', 'Nurse Charlie'],
                roster: {}, // Format: {"Mon-m": ["Dr. Alice"]}

                init() {
                    const saved = localStorage.getItem('rms_data');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        this.staff = parsed.staff || this.staff;
                        this.roster = parsed.roster || this.roster;
                    }
                },
                save() {
                    localStorage.setItem('rms_data', JSON.stringify({ staff: this.staff, roster: this.roster }));
                },
                login() {
                    if (this.user === 'admin' && this.pass === 'password123') this.isLoggedIn = true;
                    else alert('Login Failed');
                },
                getEntries(day, sid) {
                    const key = day + '-' + sid;
                    return (this.roster[key] || []).map(name => ({ name }));
                },
                assign(day, sid) {
                    const name = prompt("Enter Name from Staff List:");
                    if (name) {
                        const key = day + '-' + sid;
                        if (!this.roster[key]) this.roster[key] = [];
                        this.roster[key].push(name);
                        this.save();
                    }
                },
                remove(day, sid, index) {
                    const key = day + '-' + sid;
                    this.roster[key].splice(index, 1);
                    this.save();
                },
                addStaff() {
                    const n = prompt("New Staff Name:");
                    if (n) { this.staff.push(n); this.save(); }
                },
                deleteStaff(name) {
                    this.staff = this.staff.filter(s => s !== name);
                    this.save();
                }
            }
        }
    </script>
</body>
</html>
